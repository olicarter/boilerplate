name: ripple

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ripple
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-electric-publication.sql
    command:
      - postgres
      - -c
      - wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ripple?sslmode=disable
      ELECTRIC_INSECURE: "true"
      ELECTRIC_MANUAL_TABLE_PUBLISHING: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ripple
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGUSER: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgreplicadata:/var/lib/postgresql/data
      - ./docker/replica-init.sh:/docker-entrypoint-initdb.d/00-replica-init.sh
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - replica

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  pgreplicadata:
