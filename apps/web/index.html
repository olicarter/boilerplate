<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ripple</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      @keyframes skeleton-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

      /* Markdown prose */
      .md-prose { color: #333; font-size: 14px; line-height: 1.7; }
      .md-prose p { margin: 0 0 0.75em; }
      .md-prose p:last-child { margin-bottom: 0; }
      .md-prose h1, .md-prose h2, .md-prose h3 { margin: 1em 0 0.4em; font-weight: 600; line-height: 1.3; }
      .md-prose h1 { font-size: 1.3em; }
      .md-prose h2 { font-size: 1.15em; }
      .md-prose h3 { font-size: 1em; }
      .md-prose ul, .md-prose ol { margin: 0 0 0.75em; padding-left: 1.5em; }
      .md-prose li { margin-bottom: 0.25em; }
      .md-prose code { background: #f3f3f3; border-radius: 3px; padding: 1px 5px; font-size: 0.9em; font-family: 'SF Mono', 'Fira Code', monospace; }
      .md-prose pre { background: #f3f3f3; border-radius: 4px; padding: 0.75em 1em; overflow-x: auto; margin: 0 0 0.75em; }
      .md-prose pre code { background: none; padding: 0; }
      .md-prose blockquote { margin: 0 0 0.75em; padding: 0 0 0 1em; border-left: 3px solid #ddd; color: #666; }
      .md-prose a { color: #1a56d6; }
      .md-prose strong { font-weight: 600; }
      .md-prose hr { border: none; border-top: 1px solid #eee; margin: 1em 0; }
      .md-prose table { border-collapse: collapse; width: 100%; margin-bottom: 0.75em; font-size: 13px; }
      .md-prose th, .md-prose td { border: 1px solid #ddd; padding: 0.4em 0.75em; text-align: left; }
      .md-prose th { background: #f8f8f8; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
